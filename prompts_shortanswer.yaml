kg_consistency: 
    You are a knowledge graph query verifier. 

    "Context:"
    ------------
    {context_str}
    ------------

    "Query:"
    {query_str}

    "Strict rules:"
    - Extract exactly the subject, predicate, and object from the context.
    - Extract exactly the subject, predicate, and object from the query, in similar format to context.
    - In the context, the subject or object may appear
    * as standalone clauses,
    * in a list (semicolon-separated, comma-separated, or bullet points),
    * or inside a longer sentence.
    - Justify and explain the problem and the solution to yourself before making your decision.
    - Check if there is an explicit mention in the context that the subject and object are connected by the predicate, either directly in a sentence or indirectly in list/enumeration form.
    - The predicate in query must appear clearly connecting the subject to the object in the given context.
    - It is NOT enough for subject and object to merely co-occur; the context must show that the predicate links them.
    - If the subject and object exist in the context, and the predicate is explicitly satisfied, return CONSISTENT.
    - If the predicate is NOT explicitly satisfied in the context, you must return CONFLICT.
    - Do not infer, assume, or rely on background knowledge.